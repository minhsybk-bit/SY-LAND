name: Deploy SỸ LAND to GitHub Pages

on:
  push:
    branches: [main]
  release:
    types: [published, edited, released]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Validate account server configuration
        shell: bash
        run: |
          if [[ -z "$VITE_SUPABASE_URL" || -z "$VITE_SUPABASE_ANON_KEY" ]]; then
            echo "::error::Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY repository secret."
            exit 1
          fi
          if [[ ! "$VITE_SUPABASE_URL" =~ ^https://[a-zA-Z0-9-]+\.supabase\.co/?$ ]]; then
            echo "::error::VITE_SUPABASE_URL must look like https://xxxxx.supabase.co"
            exit 1
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Build website
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - run: mv pages-dist/github-pages.html pages-dist/index.html
      - name: Publish update manifest from latest GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "User-Agent": "SYLAND-Pages/1.0",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          try:
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{os.environ['REPOSITORY']}/releases/latest", headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  release = json.load(response)
              assets = release.get("assets") or []
              installers = [a for a in assets if str(a.get("name", "")).lower().endswith((".zip", ".exe"))]
              if not installers:
                  raise RuntimeError("Bản phát hành chưa có ZIP hoặc EXE")
              asset = next((a for a in installers if "setup" in str(a.get("name", "")).lower()), installers[0])
              version = str(release.get("tag_name") or "").lstrip("vV")
              digest = str(asset.get("digest") or "").lower().replace("sha256:", "")
              with open("latest_version.json", encoding="utf-8") as handle:
                  fallback = json.load(handle)
              notes = [line.strip(" -*\t") for line in str(release.get("body") or "").splitlines() if line.strip()][:12]
              manifest = {
                  "app_name": "SỸ LAND", "latest_version": version,
                  "release_date": str(release.get("published_at") or "")[:10],
                  "download_url": asset["browser_download_url"], "release_page_url": release["html_url"],
                  "website_download_url": "https://minhsybk-bit.github.io/SY-LAND/#tai-phan-mem",
                  "sha256": digest if len(digest) == 64 else (fallback.get("sha256", "") if fallback.get("latest_version") == version else ""),
                  "release_notes": notes or ["Bản phát hành mới của SỸ LAND."], "force_update": False,
              }
          except Exception as exc:
              print(f"Cảnh báo: dùng manifest trong kho mã vì không đọc được Release: {exc}")
              with open("latest_version.json", encoding="utf-8") as handle:
                  manifest = json.load(handle)
          with open("pages-dist/latest_version.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          print(f"Manifest triển khai: v{manifest['latest_version']}")
          PY
      - name: Copy favicon
        shell: bash
        run: |
          if [[ -f public/favicon.svg ]]; then
            cp public/favicon.svg pages-dist/favicon.svg
          elif [[ -f favicon.svg ]]; then
            cp favicon.svg pages-dist/favicon.svg
          else
            echo "::warning::favicon.svg was not found; deploying without a custom favicon."
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
